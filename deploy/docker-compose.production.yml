name: file-agent

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [internal]

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTO_CREATE_TABLES: "false"
      FILE_STORAGE_ROOT: /data/uploads
      LOG_DIR: /data/logs
      APP_RUNTIME: api
    volumes:
      - ../data/uploads:/data/uploads
      - ../data/logs:/data/logs
      - ../data/managed/student-affairs:/managed/student-affairs:ro
    depends_on:
      postgres:
        condition: service_healthy
    expose: ["8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [internal]

  filesystem-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTO_CREATE_TABLES: "false"
      FILE_STORAGE_ROOT: /data/uploads
      LOG_DIR: /data/logs
      APP_RUNTIME: filesystem-worker
      FILESYSTEM_WORKER_ID: filesystem-worker-1
      FILESYSTEM_WORKER_POLL_SECONDS: 3
    volumes:
      - ../data/uploads:/data/uploads
      - ../data/logs:/data/logs
      - ../data/managed/student-affairs:/managed/student-affairs:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    env_file: [.env]
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS}
      UPLOAD_MAX_SIZE: ${UPLOAD_MAX_SIZE}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
